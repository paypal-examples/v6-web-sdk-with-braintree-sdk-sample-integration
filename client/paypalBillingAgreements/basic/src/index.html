<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>PayPal Billing Agreements Flow</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="/client/shared/styles.css" />
    <style>
      .buttons-container {
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
      }
      alert-component {
        max-width: 50rem;
        margin-top: 4rem;
      }
    </style>
  </head>
  <body>
    <h1>PayPal Billing Agreements Flow</h1>
    <p>
      This is the recommended integration pattern for Braintree merchants using
      the PayPal button to vault PayPal accounts for future payments.
    </p>

    <div class="buttons-container">
      <paypal-button id="paypal-button" type="pay" hidden></paypal-button>
    </div>
    <alert-component></alert-component>

    <script src="app.js"></script>

    <script src="https://www.paypalobjects.com/braintree/web/3.137.0/js/client.min.js"></script>
    <script
      async
      src="https://js.braintreegateway.com/web/3.137.0/js/paypal-checkout-v6.min.js"
      onload="onPayPalCheckoutV6Loaded()"
    ></script>

    <script async src="/client/shared/alert-component.js"></script>
  </body>
</html>
