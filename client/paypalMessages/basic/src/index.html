<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>PayPal Messages</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="/client/shared/styles.css" />
    <style>
      alert-component {
        max-width: 50rem;
        margin-top: 4rem;
      }
    </style>
  </head>
  <body>
    <h1>PayPal Messages</h1>
    <p>
      This is the recommended integration pattern for Braintree merchants using
      the PayPal Messages.
    </p>

    <paypal-message
      id="paypal-message"
      auto-bootstrap
      amount="50"
      buyer-country="US"
      currency-code="USD"
    ></paypal-message>

    <script src="app.js"></script>

    <script src="https://js.braintreegateway.com/web/3.142.0/js/client.min.js"></script>
    <script
      async
      src="https://js.braintreegateway.com/web/3.142.0/js/paypal-checkout-v6.min.js"
      onload="onPayPalCheckoutV6Loaded()"
    ></script>
  </body>
</html>
