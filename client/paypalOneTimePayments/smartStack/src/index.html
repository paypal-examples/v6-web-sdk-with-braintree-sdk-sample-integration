<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>PayPal Smart Payment Stack</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="/client/shared/styles.css" />
    <style>
      alert-component {
        max-width: 50rem;
        margin-top: 4rem;
      }

      .buttons-container {
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
      }
    </style>
  </head>
  <body>
    <h1>PayPal Smart Payment Stack</h1>
    <p>
      This demonstrates rendering multiple PayPal payment buttons (PayPal, Pay
      Later, and PayPal Credit) in a vertical stack based on eligibility.
    </p>

    <div class="buttons-container">
      <paypal-button id="paypal-button" type="pay" hidden></paypal-button>
      <paypal-pay-later-button
        id="paylater-button"
        hidden
      ></paypal-pay-later-button>
      <paypal-credit-button
        id="paypal-credit-button"
        hidden
      ></paypal-credit-button>
    </div>
    <alert-component></alert-component>

    <script src="app.js"></script>

    <script src="https://js.braintreegateway.com/web/3.139.0/js/client.min.js"></script>
    <script
      async
      src="https://js.braintreegateway.com/web/3.139.0/js/paypal-checkout-v6.min.js"
      onload="onPayPalCheckoutV6Loaded()"
    ></script>

    <script async src="/client/shared/alert-component.js"></script>
  </body>
</html>
