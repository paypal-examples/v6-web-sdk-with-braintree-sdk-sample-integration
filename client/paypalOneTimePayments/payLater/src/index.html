<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>PayPal Pay Later One-time Payment Flow</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="/client/shared/styles.css" />
    <style>
      alert-component {
        max-width: 50rem;
        margin-top: 4rem;
      }
    </style>
  </head>
  <body>
    <h1>PayPal Pay Later One-time Payment Flow</h1>
    <p>
      This demonstrates the integration pattern for Braintree merchants using
      the PayPal Pay Later button for one-time payments.
    </p>

    <paypal-pay-later-button
      id="paypal-pay-later-button"
      hidden
    ></paypal-pay-later-button>
    <alert-component></alert-component>

    <script src="app.js"></script>

    <script src="https://js.braintreegateway.com/web/3.139.0/js/client.min.js"></script>
    <script
      async
      src="https://js.braintreegateway.com/web/3.139.0/js/paypal-checkout-v6.min.js"
      onload="onPayPalCheckoutV6Loaded()"
    ></script>

    <script async src="/client/shared/alert-component.js"></script>
  </body>
</html>
